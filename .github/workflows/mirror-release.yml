name: Mirror APK from app repo

on:
  repository_dispatch:
    types: [new-release]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.1)'
        required: true

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Set tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "tag=${{ github.event.client_payload.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download APK from app repo release
        env:
          GH_TOKEN: ${{ secrets.APP_REPO_TOKEN }}
        run: |
          echo "Downloading APK for tag: ${{ steps.tag.outputs.tag }}"
          gh release download "${{ steps.tag.outputs.tag }}" \
            --repo enol-in/enol \
            --pattern "*.apk" \
            --output enol-release.apk

      - name: Fetch release notes from app repo
        env:
          GH_TOKEN: ${{ secrets.APP_REPO_TOKEN }}
        run: |
          gh release view "${{ steps.tag.outputs.tag }}" \
            --repo enol-in/enol \
            --json body --jq '.body' > release-notes.md

      - name: Create release on website repo
        env:
          GH_TOKEN: ${{ secrets.APP_REPO_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"

          # Delete existing release with same tag if it exists
          gh release delete "$TAG" --repo enol-in/enol-in.github.io --yes 2>/dev/null || true
          gh api repos/enol-in/enol-in.github.io/git/refs/tags/"$TAG" -X DELETE 2>/dev/null || true

          gh release create "$TAG" enol-release.apk#enol-release.apk \
            --repo enol-in/enol-in.github.io \
            --title "enol $TAG" \
            --notes-file release-notes.md
